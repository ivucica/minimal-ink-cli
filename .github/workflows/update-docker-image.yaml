name: Build and Push Docker Image

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ivucica/minimal-ink-cli

jobs:
  build-and-push:
    outputs:
      image: ${{ env.IMAGE_NAME }}
      digest: ${{ steps.push.outputs.digest }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run local rebuild script
        run: |
          chmod +x rebuild.sh
          ./rebuild.sh

      - name: Tag and Push images to GHCR
        id: push
        run: |
          docker tag minimal-ink-cli:latest ${{ env.IMAGE_NAME }}:latest
          docker tag minimal-ink-cli:latest ${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}

          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}

          FULL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.IMAGE_NAME }}:latest)
          PURE_DIGEST=$(echo $FULL_DIGEST | awk -F@ '{print $2}')
          
          echo "digest=$PURE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest container (Native GitHub Artifact Attestations)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest generated receipt files
        uses: actions/attest-build-provenance@v2
        with:
          # This establishes verifiable provenance that *this workflow run* created
          # these specific json receipt files, fulfilling the linked-artifact mandate.
          subject-path: './build-provenance/*.json'

      - name: Link custom provenance bundles to OCI image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the gh CLI to push the custom predicate files (apt/npm/nodejs receipts)
          # into the GHCR as signed referrers securely bound to the image digest.
          gh attestation add "oci://${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" \
            --bundle ./build-provenance/deb-receipt.json \
            --push-to-registry
            
          gh attestation add "oci://${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" \
            --bundle ./build-provenance/npm-receipt.json \
            --push-to-registry
            
          gh attestation add "oci://${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" \
            --bundle ./build-provenance/nodejs-receipt.json \
            --push-to-registry

      - name: Archive receipt artifacts for Workflow UI
        uses: actions/upload-artifact@v4
        with:
          name: internal-provenance-receipts
          path: ./build-provenance/*.json
          retention-days: 30

      - name: Create PR with updated manifests and provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there are changes to package files or provenance receipts
          if [[ -n "$(git status --porcelain ./build-provenance package.json package-lock.json 2>/dev/null)" ]]; then
            echo "Changes detected. Creating a Pull Request..."
            
            # Configure git identity as the standard GitHub Actions bot
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            BRANCH_NAME="update-manifests-${GITHUB_RUN_ID}"
            git checkout -b $BRANCH_NAME
            
            git add ./build-provenance/*.json package.json package-lock.json
            git commit -m "chore: update provenance and package manifests for ${GITHUB_SHA::7}"
            git push origin $BRANCH_NAME
            
            # Create the Pull Request via gh cli
            gh pr create \
              --title "chore: update provenance and package manifests" \
              --body "Automatically generated PR to update SLSA provenance receipts, \`package.json\`, and \`package-lock.json\` from workflow run ${GITHUB_RUN_ID}." \
              --base master \
              --head $BRANCH_NAME
          else
            echo "No changes to commit."
          fi

  # This job uses the official SLSA framework reusable workflow.
  # It runs in total isolation to generate a non-forgeable SLSA Level 3 builder signature.
  generate-slsa-provenance:
    needs: [build-and-push]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build-and-push.outputs.image }}
      digest: ${{ needs.build-and-push.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
