name: Build and Push Docker Image

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ivucica/minimal-ink-cli

jobs:
  build-and-push:
    outputs:
      image: ${{ env.IMAGE_NAME }}
      digest: ${{ steps.push.outputs.digest }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run local rebuild script
        run: |
          chmod +x rebuild.sh
          ./rebuild.sh

      - name: Submit SBOM to GitHub Dependency Graph
        uses: advanced-security/spdx-dependency-submission-action@v0.2.0
        with:
          # Point it exactly to the raw SPDX file generated by Syft
          filePath: './build-provenance/raw-spdx-sbom.json'

      - name: Tag and Push images to GHCR
        id: push
        run: |
          docker tag minimal-ink-cli:latest ${{ env.IMAGE_NAME }}:latest
          docker tag minimal-ink-cli:latest ${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}

          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}

          FULL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.IMAGE_NAME }}:latest)
          PURE_DIGEST=$(echo $FULL_DIGEST | awk -F@ '{print $2}')
          
          echo "digest=$PURE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest Container Image to GHCR
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest Local Receipt Files (Linked Artifacts API)
        uses: actions/attest-build-provenance@v4
        with:
          # Using subject-path automatically triggers the internal GitHub 
          # /artifacts/metadata/storage-record API to securely link these 
          # physical files to the workflow's attestations UI.
          subject-path: './build-provenance/*.json'

      - name: Archive receipt artifacts for Workflow UI
        uses: actions/upload-artifact@v7
        with:
          name: internal-provenance-receipts
          path: ./build-provenance/*.json
          retention-days: 30

      - name: Create PR with updated manifests and provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MEANINGFUL_CHANGES=false

          # Check package.json and package-lock.json for any changes
          if [[ -n "$(git status --porcelain package.json package-lock.json 2>/dev/null)" ]]; then
            MEANINGFUL_CHANGES=true
          fi

          # Check build-provenance files, excluding the two receipts with known noop-only fields
          OTHER_PROVENANCE=$(git status --porcelain ./build-provenance 2>/dev/null \
            | awk '{print $2}' \
            | grep -vE '(nodejs-receipt|container-receipt)\.json$' || true)
          if [[ -n "$OTHER_PROVENANCE" ]]; then
            MEANINGFUL_CHANGES=true
          fi

          # Check nodejs-receipt.json, ignoring verifiedAt (changes on every verification run)
          if [[ -n "$(git status --porcelain build-provenance/nodejs-receipt.json 2>/dev/null)" ]]; then
            if git show HEAD:build-provenance/nodejs-receipt.json > /tmp/nodejs-head.json 2>/dev/null; then
              jq 'del(.predicate.runDetails.metadata.verifiedAt)' /tmp/nodejs-head.json > /tmp/nodejs-head-stripped.json
              jq 'del(.predicate.runDetails.metadata.verifiedAt)' build-provenance/nodejs-receipt.json > /tmp/nodejs-curr-stripped.json
              if ! diff -q /tmp/nodejs-head-stripped.json /tmp/nodejs-curr-stripped.json > /dev/null 2>&1; then
                MEANINGFUL_CHANGES=true
              fi
            else
              MEANINGFUL_CHANGES=true  # New file
            fi
          fi

          # Check container-receipt.json, ignoring invocationId, startedOn, and subject (image tag/digest)
          if [[ -n "$(git status --porcelain build-provenance/container-receipt.json 2>/dev/null)" ]]; then
            if git show HEAD:build-provenance/container-receipt.json > /tmp/container-head.json 2>/dev/null; then
              jq 'del(.predicate.runDetails.metadata.invocationId, .predicate.runDetails.metadata.startedOn, .subject)' \
                /tmp/container-head.json > /tmp/container-head-stripped.json
              jq 'del(.predicate.runDetails.metadata.invocationId, .predicate.runDetails.metadata.startedOn, .subject)' \
                build-provenance/container-receipt.json > /tmp/container-curr-stripped.json
              if ! diff -q /tmp/container-head-stripped.json /tmp/container-curr-stripped.json > /dev/null 2>&1; then
                MEANINGFUL_CHANGES=true
              fi
            else
              MEANINGFUL_CHANGES=true  # New file
            fi
          fi

          if [[ "$MEANINGFUL_CHANGES" == "true" ]]; then
            echo "Meaningful changes detected. Fetching bot identity via API..."
            
            # Fetch the exact ID for the GitHub Actions bot via the Users API
            BOT_ID=$(gh api /users/github-actions%5Bbot%5D --jq '.id')
            git config user.name "github-actions[bot]"
            git config user.email "${BOT_ID}+github-actions[bot]@users.noreply.github.com"
            
            BRANCH_NAME="update-manifests-${GITHUB_RUN_ID}"
            git checkout -b $BRANCH_NAME
            
            git add ./build-provenance/*.json package.json package-lock.json
            git commit -m "chore: update provenance and package manifests for ${GITHUB_SHA::7}"
            git push --force origin $BRANCH_NAME
            
            # Create the Pull Request via gh cli
            gh pr create \
              --title "chore: update provenance and package manifests" \
              --body "Automatically generated PR to update SLSA provenance receipts, \`package.json\`, and \`package-lock.json\` from workflow run ${GITHUB_RUN_ID}." \
              --base master \
              --head $BRANCH_NAME || true  # it's bad to ignore failure for initial create... but it may be a duplicate PR for the branch.
          else
            echo "No meaningful changes to commit (only noop fields changed)."
          fi

  # This job uses the official SLSA framework reusable workflow.
  # It runs in total isolation to generate a non-forgeable SLSA Level 3 builder signature.
  generate-slsa-provenance:
    needs: [build-and-push]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build-and-push.outputs.image }}
      digest: ${{ needs.build-and-push.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
